! hub-r3 — DIRECTLY CONNECTED to both CORP (10.20.0.0/24) and PCI (10.10.0.0/24).
! Hammerhead reachability: 10.20.0.1 -> 10.10.0.1 = REACHABLE (locally connected).
! Path-grounding verdict: PATH-CONFIRMED (active leak, keep critical).
!
hostname hub-r3
!
interface Loopback0
 ip address 10.0.3.1 255.255.255.255
!
interface GigabitEthernet0/0
 description CORP user LAN
 ip address 10.20.0.3 255.255.255.0
 ip access-group ACL_SEGCHECK in
 no shutdown
!
interface GigabitEthernet0/1
 description PCI cardholder LAN
 ip address 10.10.0.3 255.255.255.0
 no shutdown
!
ip access-list extended ACL_SEGCHECK
 10 permit tcp 10.20.0.0 0.0.255.255 10.10.0.0 0.0.255.255 eq 445
 20 deny ip any any log
!
end
