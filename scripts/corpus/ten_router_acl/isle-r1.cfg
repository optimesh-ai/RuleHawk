! isle-r1 — ISOLATED: only a loopback at 192.168.1.1/32.
! No routes to 10.10.0.0/16 (PCI) or 10.20.0.0/16 (CORP).
! Hammerhead reachability: 10.20.0.1 -> 10.10.0.1 = UNREACHABLE (no route).
! Path-grounding verdict: infeasible-path FP, suppress to info.
!
hostname isle-r1
!
interface Loopback0
 ip address 192.168.1.1 255.255.255.255
!
ip access-list extended ACL_SEGCHECK
 10 permit tcp 10.20.0.0 0.0.255.255 10.10.0.0 0.0.255.255 eq 445
 20 deny ip any any log
!
end
